spring.application.name=systemdmove

# ===== Banco de Dados (PostgreSQL) =====
# Os valores vem de variaveis de ambiente (veja .env.example).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/systemdmove}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# Flyway e a fonte da verdade do schema; o Hibernate apenas valida.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Flyway (migrations) =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===== JWT =====
# Em producao, defina APP_JWT_SECRET com um valor forte (>= 32 bytes em Base64).
app.jwt.secret=${APP_JWT_SECRET:ZHVtbXktZGV2LXNlY3JldC1jaGFuZ2UtbWUtcGxlYXNlLTEyMzQ1Njc4OTA=}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ===== Upload de anexos =====
app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ===== Servidor =====
server.port=${SERVER_PORT:8080}
